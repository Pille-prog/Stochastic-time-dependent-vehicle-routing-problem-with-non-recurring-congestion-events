# Experiment config for the committed mini fixture (45 nodes, day 601).
# Used by the test suite and by `experiments/chengdu/run.py --config <this file>`.
# Demand values are provisional until ticket 06 makes the ClientGenerator
# config-driven (the legacy hardcodes range(1, 1900) and a 60-client floor).

data_dir: .
links_file: link.csv
shortest_paths_file: all_shortest_paths.csv
instance_day: 601
traffic_days: [601]

horizon_start_minute: 300
horizon_end_minute: 780

mean_number_clients: 150
time_window_spread: 60
client_universe_seed: 0
client_universe_size: 10
client_universe_node_range: [1, 45]

congestion_lower_bound: 0.3
congestion_upper_bound: 0.4
max_congestion_duration: 120

total_train_iterations: 10
test_frequency: 5
learning_rate: 1.0e-5
warmup_learning_rate: 1.0e-6
epsilon: 0.1
n_observed_arcs: 3
first_train_seed: 1000
evaluation_seed_start: 100000
evaluation_seed_count: 50
test_episodes: 10

static_policy_mean_cost: null
